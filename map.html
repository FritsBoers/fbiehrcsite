<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map — My Hard Rock Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🎸 My <span>HRC</span> Collection</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="locations.html">Locations</a>
        <a href="pins.html">Pins</a>
        <a href="tshirts.html">T-Shirts</a>
        <a href="timeline.html">Timeline</a>
        <a href="map.html">Map</a>
        <a href="trips.html">Planned Visits</a>
        <a href="about.html">About</a>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Map Page -->
  <div class="map-page">
    <div class="map-toolbar">
      <div class="filter-group">
        <select id="map-filter-type" class="filter-select">
          <option value="">All Types</option>
          <option value="cafe">Cafes</option>
          <option value="hotel">Hotels</option>
          <option value="rockshop">Rock Shops</option>
        </select>
      </div>
      <div class="filter-group">
        <select id="map-filter-continent" class="filter-select">
          <option value="">All Continents</option>
        </select>
      </div>
      <div class="filter-group">
        <select id="map-filter-status" class="filter-select">
          <option value="">All Status</option>
          <option value="visited">Visited</option>
          <option value="planned">Planned</option>
        </select>
      </div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot cafe"></div> Cafe</div>
        <div class="legend-item"><div class="legend-dot hotel"></div> Hotel</div>
        <div class="legend-item"><div class="legend-dot rockshop"></div> Rock Shop</div>
        <div class="legend-item"><div class="legend-dot planned"></div> Planned</div>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const data = await App.loadData();

      // Populate continent filter
      const continents = App.getContinents(data);
      const continentSelect = document.getElementById('map-filter-continent');
      continents.forEach(c => {
        continentSelect.innerHTML += `<option value="${App.escapeHtml(c)}">${App.escapeHtml(c)}</option>`;
      });

      // Initialize map
      const map = L.map('map').setView([30, 10], 3);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 18
      }).addTo(map);

      // Custom marker icons
      function createIcon(color, size = 12) {
        return L.divIcon({
          className: 'custom-marker',
          html: `<div style="
            width: ${size}px;
            height: ${size}px;
            background: ${color};
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
          "></div>`,
          iconSize: [size, size],
          iconAnchor: [size / 2, size / 2],
          popupAnchor: [0, -size / 2]
        });
      }

      const icons = {
        cafe: createIcon('#c8102e', 14),
        hotel: createIcon('#d4a843', 14),
        rockshop: createIcon('#6b46c1', 14),
        planned: createIcon('#2d8a4e', 12)
      };

      let markers = [];

      function renderMarkers() {
        // Clear existing markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        const typeFilter = document.getElementById('map-filter-type').value;
        const continentFilter = document.getElementById('map-filter-continent').value;
        const statusFilter = document.getElementById('map-filter-status').value;

        let filtered = [...data];

        if (typeFilter) filtered = filtered.filter(loc => loc.type === typeFilter);
        if (continentFilter) filtered = filtered.filter(loc => loc.continent === continentFilter);
        if (statusFilter) filtered = filtered.filter(loc => loc.status === statusFilter);

        filtered.forEach(loc => {
          const icon = loc.status === 'planned' ? icons.planned : icons[loc.type] || icons.cafe;
          const dateStr = loc.status === 'planned'
            ? `Planned: ${App.formatShortDate(loc.plannedDate)}`
            : `Visited: ${App.formatShortDate(App.latestVisitDate(loc))}`;

          const thumbSrc = App.getThumb(loc);
          const photoThumb = thumbSrc
            ? `<img src="${thumbSrc}" alt="${App.escapeHtml(loc.name)}" onerror="this.style.display='none'">`
            : '';

          const popupContent = `
            <div class="map-popup">
              ${photoThumb}
              <h4>${App.escapeHtml(loc.name)}</h4>
              <p>${App.escapeHtml(loc.city)}, ${App.escapeHtml(loc.country)}<br>${dateStr}</p>
              <a href="location.html?id=${encodeURIComponent(loc.id)}" class="btn btn-primary" style="font-size: 0.75rem; padding: 5px 14px;">View Details</a>
            </div>
          `;

          const marker = L.marker([loc.lat, loc.lng], { icon })
            .bindPopup(popupContent, { maxWidth: 220 })
            .addTo(map);

          markers.push(marker);
        });

        // Fit bounds if markers exist
        if (markers.length > 0) {
          const group = L.featureGroup(markers);
          map.fitBounds(group.getBounds().pad(0.1));
        }
      }

      // Event listeners
      document.querySelectorAll('.map-toolbar .filter-select').forEach(el => {
        el.addEventListener('change', renderMarkers);
      });

      // Initial render
      renderMarkers();
    });
  </script>

</body>
</html>
