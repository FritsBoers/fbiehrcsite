<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline — My Hard Rock Collection</title>
  <meta name="description" content="A chronological timeline of all my Hard Rock Cafe, Hotel, and Rock Shop visits since the 1990s.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🎸 My <span>HRC</span> Collection</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="locations.html">Locations</a>
        <a href="pins.html">Pins</a>
        <a href="tshirts.html">T-Shirts</a>
        <a href="timeline.html">Timeline</a>
        <a href="map.html">Map</a>
        <a href="trips.html">Planned Visits</a>
        <a href="about.html">About</a>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <h1>Timeline</h1>
      <p>My collecting journey through the years</p>
    </div>
  </div>

  <!-- Timeline -->
  <section class="section" style="padding-top: 30px;">
    <div class="container">
      <div class="timeline-stats" id="timeline-stats"></div>
      <div class="timeline" id="timeline">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 My Hard Rock Collection. Not affiliated with Hard Rock International.</p>
      <p style="margin-top: 5px;">Made by FBIE.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      App.initNav();
      const data = await App.loadData();
      const visited = App.getVisited(data);

      // Flatten all visits: each visit date becomes a separate entry
      const entries = [];
      visited.forEach(loc => {
        const dates = Array.isArray(loc.visitDate) ? loc.visitDate : (loc.visitDate ? [loc.visitDate] : []);
        dates.forEach(d => {
          entries.push({ loc, date: d });
        });
      });

      // Sort newest first
      entries.sort((a, b) => {
        const da = new Date(a.date);
        const db = new Date(b.date);
        return db - da;
      });

      // Calculate visit number for each entry (chronological order)
      const visitNumbers = new Map();
      let uniqueCounter = 0;
      [...entries].reverse().forEach(entry => {
        const id = entry.loc.id;
        if (!visitNumbers.has(id)) visitNumbers.set(id, 0);
        visitNumbers.set(id, visitNumbers.get(id) + 1);
        entry.visitNum = visitNumbers.get(id);
        entry.isFirstVisit = entry.visitNum === 1;
        if (entry.isFirstVisit) {
          uniqueCounter++;
          entry.counter = uniqueCounter;
        }
      });

      // Group by year
      const years = {};
      entries.forEach(entry => {
        const year = entry.date.substring(0, 4);
        if (!years[year]) years[year] = [];
        years[year].push(entry);
      });

      // Stats
      const statsEl = document.getElementById('timeline-stats');
      const yearKeys = Object.keys(years).sort((a, b) => b - a);
      const firstYear = yearKeys[yearKeys.length - 1];
      const lastYear = yearKeys[0];
      statsEl.innerHTML = `
        <div class="timeline-stat fade-in">
          <div class="timeline-stat-number">${uniqueCounter}</div>
          <div class="timeline-stat-label">Locations Visited</div>
        </div>
        <div class="timeline-stat fade-in">
          <div class="timeline-stat-number">${yearKeys.length}</div>
          <div class="timeline-stat-label">Years Active</div>
        </div>
        <div class="timeline-stat fade-in">
          <div class="timeline-stat-number">${firstYear}</div>
          <div class="timeline-stat-label">First Visit</div>
        </div>
        <div class="timeline-stat fade-in">
          <div class="timeline-stat-number">${lastYear}</div>
          <div class="timeline-stat-label">Latest Visit</div>
        </div>
      `;

      // Render timeline
      const timelineEl = document.getElementById('timeline');
      let html = '';

      let displayCounter = uniqueCounter;

      yearKeys.forEach(year => {
        html += `<div class="timeline-year fade-in">
          <div class="timeline-year-marker">
            <span class="timeline-year-label">${year}</span>
            <span class="timeline-year-count">${years[year].length} visit${years[year].length !== 1 ? 's' : ''}</span>
          </div>
        </div>`;

        years[year].forEach((entry, i) => {
          const loc = entry.loc;
          const thumbPath = `images/locations/${loc.id}/thumbnail/1.jpg`;
          const photoFallback = `images/locations/${loc.id}/photos/1.jpg`;
          const imgHtml = `<img src="${thumbPath}" data-fallback="${photoFallback}" alt="${App.escapeHtml(loc.name)}" class="timeline-thumb" onerror="if(this.dataset.fallback){this.src=this.dataset.fallback;delete this.dataset.fallback}else{this.style.display='none'}">`;
          const side = i % 2 === 0 ? 'left' : 'right';
          const closedBadge = loc.isClosed ? ' <span class="badge badge-closed">Closed</span>' : '';
          const visits = App.visitCount(loc);
          const revisitBadge = visits > 1 ? ` <span class="badge badge-revisit">Visit #${entry.visitNum}</span>` : '';

          const dotLabel = entry.isFirstVisit ? displayCounter : '↻';

          html += `
            <div class="timeline-item timeline-${side} fade-in">
              <div class="timeline-dot${entry.isFirstVisit ? '' : ' timeline-dot-revisit'}"><span class="timeline-dot-num">${dotLabel}</span></div>
              <a href="location.html?id=${encodeURIComponent(loc.id)}" class="timeline-card">
                ${imgHtml}
                <div class="timeline-card-body">
                  <div class="timeline-card-date">${App.formatShortDate(entry.date)}</div>
                  <div class="timeline-card-name">${App.escapeHtml(loc.name)}${closedBadge}${revisitBadge}</div>
                  <div class="timeline-card-location">${App.escapeHtml(loc.city)}, ${App.escapeHtml(loc.country)}</div>
                  <div class="timeline-card-meta">${App.typeBadge(loc.type)}</div>
                </div>
              </a>
            </div>`;
          if (entry.isFirstVisit) displayCounter--;
        });
      });

      timelineEl.innerHTML = html;

      // Scroll animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    });
  </script>

</body>
</html>
